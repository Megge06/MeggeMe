version: 2
updates:
  # 1. Frontend & Blog/Photos dependencies (Node/npm workspaces)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # 2. Go backend dependencies
  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # 3. Root Dockerfile (Node / Nginx base images)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # 4. Backend Dockerfile (Go / Alpine base images)
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # 5. GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
