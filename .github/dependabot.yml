version: 2
updates:
  # 1. Frontend & Blog/Photos dependencies (Node/npm workspaces)
  - package-ecosystem: "npm"
    directory: "/" # Root package.json configures workspaces
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # 2. Go backend dependencies
  - package-ecosystem: "gomod"
    directory: "/backend" # Points to backend/go.mod
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # 3. Root Dockerfile (Node / Nginx base images)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker-root-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # 4. Backend Dockerfile (Go / Alpine base images)
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      docker-backend-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # 5. GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
