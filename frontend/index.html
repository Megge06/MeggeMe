  <body>
    <svg
      aria-hidden="true"
      focusable="false"
      style="position: absolute; width: 0; height: 0; overflow: hidden"
    >
      <defs>
        <filter id="water-ripple">
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.001 0.001"
            numOctaves="2"
            result="noise"
          >
            <animate
              attributeName="baseFrequency"
              values="0.001 0.001; 0.005 0.005; 0.001 0.001"
              dur="2s"
              repeatCount="indefinite"
            />
          </feTurbulence>
          <feDisplacementMap
            in="SourceGraphic"
            in2="noise"
            scale="20"
            xChannelSelector="R"
            yChannelSelector="G"
            result="ripple"
          />
        </filter>
      </defs>
    </svg>
