---
layout: layouts/home
title: "Photos"
---

<img
  src="{{ '/assets/wii_menu.webp' | url }}"
  alt=""
  class="background-image"
/>
<a href="../../index.html" class="background-button-link">
  <img
    src="{{ '/assets/menu_button.webp' | url }}"
    alt="Back to main page"
    class="background-button"
  />
</a>

<div class="photos">
  {% for photo in photos %}
  <button
    class="photo-div"
    onclick="openLightbox('{{ photo.url | url }}', '{{ photo.title }}')"
  >
    <img
      class="photo"
      src="{{ photo.url | url }}"
      alt="{{ photo.title }}"
      loading="lazy"
    />
  </button>
  {% endfor %}
</div>

<div
  id="lightbox"
  class="lightbox"
  onclick="closeLightbox()"
  role="dialog"
  aria-modal="true"
  aria-label="Photo viewer"
>
  <img
    id="lightbox-img"
    class="lightbox-img"
    src=""
    alt=""
    onclick="event.stopPropagation()"
  />
</div>

<div class="menu">
  <p id="time" class="time">Time</p>
  <p id="date">Date</p>
</div>

<script src="{{ '/script.js' | url }}"></script>
