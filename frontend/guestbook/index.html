<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Guestbook - Megge" />
    <meta name="author" content="Megge" />

    <meta property="og:title" content="Guestbook - Megge" />
    <meta property="og:description" content="Guestbook - Megge" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://megge.me/" />
    <meta property="og:image" content="https://megge.me/assets/home/favicon/favicon_512px.png" />
    <meta property="og:site_name" content="Guestbook - Megge" />

    <link rel="icon" type="image/png" sizes="16x16" href="../assets/home/favicon/favicon_16px.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/home/favicon/favicon_32px.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="../assets/home/favicon/favicon_48px.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/home/favicon/favicon_180px.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="../assets/home/favicon/favicon_512px.png" />

    <title>Guestbook - Megge</title> 
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="guestbook">
      <h1>Guestbook</h1>

      <section id="entries" aria-label="Guestbook entries">
        <article class="entry">
          <p class="name">Megge Mega</p>
          <p class="message">This is an example message.</p>
        </article>
      </section>

      <nav id="pagination" aria-label="Pagination">
        <button id="prev">Previous Page</button>
        <span id="page-display" aria-live="polite" aria-atomic="true">Page 1</span>
        <button id="next">Next Page</button>
      </nav>

      <form id="guestbook-form">
        <p id="form-header">Leave a Message</p>
        
        <div class="form-group">
          <label for="form-name">Name</label>
          <input id="form-name" name="name" type="text" maxlength="50" required />
        </div>

        <div class="form-group">
          <label for="form-message">Message</label>
          <textarea id="form-message" name="message" maxlength="1000" required></textarea>
        </div>

        <button type="submit">Post Message</button>
      </form>
    </main>
    <script src="script.js" defer></script>
  </body>
</html>
