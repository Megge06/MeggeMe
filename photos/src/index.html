---
layout: layouts/home
title: "Photos"
---

<img
  src="{{ '/assets/wii_menu.webp' | url }}"
  alt=""
  class="background-image"
/>
<a href="../../index.html" class="background-button-link">
  <img
    src="{{ '/assets/menu_button.webp' | url }}"
    alt="Back to main page"
    class="background-button"
  />
</a>

<div class="photos">
  {% for photo in photos %}
  <button
    class="photo-div"
    onclick="openLightbox('{{ photo.url | url }}', '{{ photo.title }}')"
  >
    <img
      class="photo"
      src="{{ photo.url | url }}"
      alt="{{ photo.title }}"
      loading="lazy"
    />
  </button>
  {% endfor %}
</div>

<div
  id="lightbox"
  class="lightbox"
  onclick="closeLightbox()"
  role="dialog"
  aria-modal="true"
  aria-label="Photo viewer"
>
  <img
    id="lightbox-img"
    class="lightbox-img"
    src=""
    alt=""
    onclick="event.stopPropagation()"
  />
</div>

<div class="menu">
  <p id="time" class="time">Time</p>
  <p id="date">Date</p>
</div>

<script>
  function updateDateTime() {
    const now = new Date();

    const timeString = now.toLocaleTimeString("en-US", {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false,
    });

    const weekday = now.toLocaleDateString("en-US", {
      weekday: "short",
    });
    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const dateString = `${weekday} ${day}/${month}`;

    document.getElementById("time").textContent = timeString;
    document.getElementById("date").textContent = dateString;
  }

  updateDateTime();

  setInterval(updateDateTime, 1000);

  function openLightbox(url, alt) {
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    lightboxImg.src = url;
    lightboxImg.alt = alt;
    lightbox.style.display = "flex";
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    const lightbox = document.getElementById("lightbox");
    lightbox.style.display = "none";
    document.body.style.overflow = "auto";
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeLightbox();
  });
</script>
