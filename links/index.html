<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Links</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="style.css" />
    <script src="script.js"></script>

    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/favicon/favicon_16px.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/favicon/favicon_32px.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="48x48"
      href="../assets/favicon/favicon_48px.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicon/favicon_180px.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="../assets/favicon/favicon_512px.png"
    />
  </head>
  <body>
    <a href="../index.html" class="back-button">
      <img src="../assets/links/back_arrow.png" alt="Back to main menu" />
    </a>
    <div class="panorama-container">
      <div class="panorama">
        <div class="face front"></div>
        <div class="face right"></div>
        <div class="face back"></div>
        <div class="face left"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
      </div>
    </div>

    <div class="content-wrapper">
      <div class="logo">
        <img
          class="minecraft-logo"
          src="../assets/links/minecraft_logo.webp"
          alt="Profile Picture"
        />
      </div>
      <div>
        <div class="button-container">
          <img
            src="../assets/links/minecraft_button.webp"
            alt="Minecraft Links"
          />
          <a
            href="https://github.com/Megge06"
            target="_blank"
            rel="noopener noreferrer"
            class="link"
            >Github</a
          >
        </div>
        <div class="button-container">
          <img
            src="../assets/links/minecraft_button.webp"
            alt="Minecraft Links"
          />
          <a
            href="https://steamcommunity.com/id/CringeAssMegge/"
            target="_blank"
            rel="noopener noreferrer"
            class="link"
            >Steam</a
          >
        </div>
        <div class="button-container">
          <img
            src="../assets/links/minecraft_button.webp"
            alt="Minecraft Links"
          />
          <a
            href="https://myanimelist.net/profile/Megge06"
            target="_blank"
            rel="noopener noreferrer"
            class="link"
            >MyAnimeList</a
          >
        </div>
        <div class="button-container">
          <img
            src="../assets/links/minecraft_button.webp"
            alt="Minecraft Links"
          />
          <a
            href="https://discord.com/users/_megge"
            target="_blank"
            rel="noopener noreferrer"
            class="link"
            >Discord</a
          >
        </div>
        <div class="button-container">
          <img
            src="../assets/links/minecraft_button.webp"
            alt="Minecraft Links"
          />
          <a
            href="https://www.tiktok.com/@megge066"
            target="_blank"
            rel="noopener noreferrer"
            class="link"
            >TikTok</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
